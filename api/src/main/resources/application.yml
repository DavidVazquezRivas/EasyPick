server:
  port: 8080

spring:
  application:
    name: easypick-api
  profiles:
    active: dev

  # Database configuration
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/easypick}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:uQFPS^axE88w!x4T%keL}
    driver-class-name: org.postgresql.Driver


  # Seed data configuration
  sql:
    init:
      mode: always
      data-locations: classpath:db.seeds/*.sql

  jpa:
    show-sql: true # To see the SQL statements in the console
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  web:
    error:
      include-message: always


logging:
  level:
    es.uib.easypick: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG

application:
  security:
    jwt:
      secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      expiration: 3600000 # 1 hour in milliseconds
    refresh-token:
      expiration-days: 30 # Refresh token validity in days

# Cloud configuration
cloud:
  aws:
    credentials:
      access-key: ${AWS_ACCESS_KEY:admin}
      secret-key: ${AWS_SECRET_KEY:password123}
    region:
      static: ${AWS_REGION:eu-west-1}
    s3:
      endpoint: ${AWS_S3_ENDPOINT:http://minio:9000}
      public-url: ${AWS_S3_PUBLIC_URL:http://localhost:9000}
      bucket-name: ${AWS_S3_BUCKET_NAME:easypick-images}
