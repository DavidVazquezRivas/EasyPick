server:
  port: 8080

spring:
  application:
    name: easypick-api
  profiles:
    active: dev

  # Database configuration
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/easypick}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:uQFPS^axE88w!x4T%keL}
    driver-class-name: org.postgresql.Driver

  # Seed data configuration
  sql:
    init:
      mode: always
      data-locations: classpath:db.seeds/*.sql

  jpa:
    show-sql: true # To see the SQL statements in the console
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  web:
    error:
      include-message: always


logging:
  level:
    es.uib.easypick: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG

application:
  security:
    jwt:
      secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      expiration: 3600000 # 1 hour in milliseconds