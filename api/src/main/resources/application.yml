server:
  port: 8080

spring:
  application:
    name: easypick-api

  # Database configuration
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/easypick}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:uQFPS^axE88w!x4T%keL}
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true # To see the SQL statements in the console
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  web:
    error:
      include-message: always

logging:
  level:
    es.uib.easypick: INFO
    org.springframework.web: INFO