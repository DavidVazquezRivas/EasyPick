version: '3.8'

services:
  db:
    image: postgres:16
    container_name: easypick-db
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql

  # AWS S3 compatible storage using MinIO
  minio:
    image: minio/minio:latest
    container_name: easypick-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - '9000:9000' # Port for  API (Where Spring Boot connects)
      - '9001:9001' # Port for the web console (Accessible at http://localhost:9001)
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  # Temporal container to set up the bucket and make it public automatically
  minio-setup:
    image: minio/mc:latest
    container_name: easypick-minio-setup
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      /usr/bin/mc mb myminio/easypick-images --ignore-existing;
      /usr/bin/mc anonymous set public myminio/easypick-images;
      exit 0;
      "

  api:
    build:
      context: ./api
    container_name: easypick-api
    ports:
      - '8080:8080'
    depends_on:
      - db
      - minio
    environment:
      # Database connections overrides
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/${DATABASE_NAME}
      - SPRING_DATASOURCE_USERNAME=${DATABASE_USER}
      - SPRING_DATASOURCE_PASSWORD=${DATABASE_PASSWORD}

      # AWS S3 overrides for MinIO
      - AWS_CREDENTIALS_ACCESS_KEY=${MINIO_ROOT_USER}
      - AWS_CREDENTIALS_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - AWS_S3_ENDPOINT=http://minio:9000
      - AWS_S3_PUBLIC_URL=http://${IP_ADDRESS}:9000
      - AWS_S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - AWS_REGION_STATIC=eu-west-1

      # Garment Processor overrides
      - GARMENT_PROCESSOR_BASE_URL=http://garment-processor:8082
      - GARMENT_PROCESSOR_PROCESS_ENDPOINT=/process-garments
      - GARMENT_PROCESSOR_TIMEOUT_SECONDS=${PROCESSOR_TIMEOUT_SECONDS}

      # Google
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}

  garment-processor:
    build:
      context: ./garment-processor
    container_name: easypick-garment-processor
    ports:
      - '8082:8082'
    depends_on:
      - api
    environment:
      - EASYPICK_API_BASE_URL=http://api:8080/api/v1
      - EASYPICK_REFRESH_TOKEN=${EASYPICK_REFRESH_TOKEN}
      - EASYPICK_AUTH_REFRESH_ENDPOINT=/auth/refresh
      - GARMENT_CONFIG_ENDPOINT=/garments/configurations
      - GARMENT_CONFIG_TIMEOUT_SECONDS=${API_TIMEOUT_SECONDS}
      - SYNC_GARMENT_LABELS_ON_STARTUP=true
      - TRANSFORMERS_CACHE=/app/.cache/models
      - HF_HOME=/app/.cache/huggingface
    volumes:
      - garment_processor_models:/app/.cache
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://localhost:8082/health/ready', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

volumes:
  pgdata:
  minio_data:
  garment_processor_models:
